<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultraviolence | Pro Planner & Diary</title>
    <style>
        /* Essential Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime&family=Homemade+Apple&family=Special+Elite&family=Playfair+Display:ital,wght@1,700&family=Dancing+Script&family=IM+Fell+English+SC&family=Almendra+Display&family=UnifrakturMaguntia&family=EB+Garamond&display=swap');

        :root {
            --cherry: #8b0000;
            --cream: #f4f1ea;
            --ink: #1a1a1a; 
            --paper: #fdfaf0;
        }

        body { background-color: #000; margin: 0; padding: 0; font-family: 'Courier Prime', monospace; color: white; min-height: 100vh; overflow-x: hidden; }

        /* NAVIGATION */
        nav {
            background: #000; padding: 20px; display: flex; justify-content: center; gap: 50px;
            position: sticky; top: 0; z-index: 9999; border-bottom: 4px solid var(--cherry);
        }
        nav button {
            background: transparent; border: none; color: white; font-family: 'Bebas Neue'; 
            font-size: 1.8rem; cursor: pointer; letter-spacing: 3px;
        }
        nav button:hover { color: var(--cherry); }

        .view { display: none; width: 100%; min-height: 100vh; }
        .view.active { display: block; }
        #diary.active { display: flex; justify-content: center; align-items: center; background: #1a120d; }

        /* DIARY SIDEBAR */
        .archive-side { width: 280px; background: rgba(0,0,0,0.95); color: white; padding: 25px; height: 650px; display: flex; flex-direction: column; gap: 15px; border-right: 1px solid #333; }
        .archive-side label { font-family: 'Bebas Neue'; color: #666; font-size: 0.8rem; }
        .archive-side select, .archive-side input {
            background: #111; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; font-family: 'Courier Prime';
        }
        .archive-side button { border-radius: 50px; padding: 12px; font-family: 'Bebas Neue'; cursor: pointer; background: #222; color: white; border: 1px solid #444; }
        .bold-active { background: var(--cherry) !important; border-color: white !important; }

        /* DIARY BOOK */
        #bookWrapper { position: relative; perspective: 1500px; width: 900px; height: 650px; }
        #bookCover { 
            width: 100%; height: 100%; background: #1a120d; border: 10px solid #000; border-left: 25px solid #000; 
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; 
            position: absolute; transition: 0.8s; transform-origin: left; 
        }
        .book { width: 100%; height: 100%; background: var(--paper); display: flex; border: 4px solid #000; visibility: hidden; }
        .page-content { width: 50%; padding: 50px; background-image: linear-gradient(#e5e5e5 1px, transparent 1px); background-size: 100% 35px; position: relative; }
        
        /* THE TEXTAREAS */
        textarea { 
            width: 100%; height: 100%; background: transparent !important; border: none !important; 
            outline: none !important; resize: none; line-height: 35px; font-size: 22px; color: #1a1a1a !important;
            transition: none; /* Disable transitions to force instant font swap */
        }
        .bold-text { font-weight: 900 !important; }

        /* OTHER VIEWS (STUBS) */
        .placeholder-view { padding: 100px; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <button onclick="tab('home')">HOME</button>
        <button onclick="tab('diary')">THE DIARY</button>
    </nav>

    <div id="home" class="view active">
        <div class="placeholder-view">
            <h1 style="font-family:'Playfair Display'; font-size: 4rem;">West Coast Log</h1>
            <p>Select "The Diary" to begin archiving.</p>
        </div>
    </div>

    <div id="diary" class="view">
        <div class="archive-side">
            <h3 style="font-family:'Times New Roman'; color:var(--cherry); margin:0;">ARCHIVES</h3>
            
            <label>INK STYLE</label>
            <select id="fnt" onchange="styleBook()">
                <option value="'UnifrakturMaguntia', cursive">Medieval Gothic</option>
                <option value="'Almendra Display', serif">Medieval Calligraphy</option>
                <option value="'IM Fell English SC', serif">Old English</option>
                <option value="'Courier Prime', monospace">Typewriter</option>
                <option value="'Homemade Apple', cursive">Handwritten</option>
                <option value="'EB Garamond', serif">Classic Garamond</option>
                <option value="'Special Elite', cursive">Grunge Elite</option>
            </select>
            
            <label>INK SIZE</label>
            <input type="range" id="sz" min="14" max="50" value="22" oninput="styleBook()">

            <button id="boldBtn" onclick="toggleBold()">TOGGLE BOLD</button>
            <input type="date" id="dateJump" onchange="jump(this.value)">
            
            <button onclick="closeBook()" style="margin-top:auto; background:var(--cherry);">CLOSE ARCHIVE</button>
        </div>

        <div id="bookWrapper">
            <div id="bookCover" onclick="openBook()">
                <div style="text-align:center; border:2px solid var(--cherry); padding:40px;">
                    <h1 style="font-family:'Playfair Display'; color:var(--cream); font-size:3rem; margin:0;">ULTRAVIOLENCE</h1>
                    <p style="font-family:'Bebas Neue'; color:var(--cherry); letter-spacing:5px;">PRIVATE ARCHIVE</p>
                </div>
            </div>
            <div class="book" id="bookObj">
                <div class="page-content" style="border-right:1px solid #ddd;">
                    <h3 id="dateDisplay" style="font-family:'Bebas Neue'; color:var(--cherry); margin:0;"></h3>
                    <textarea id="txtL" oninput="save()" placeholder="Write..."></textarea>
                    <button onclick="move(-1)" style="position:absolute; bottom:20px; left:20px; background:black; color:white; border:none; padding:10px; cursor:pointer; font-family:'Bebas Neue'; border-radius:50px;">PREV</button>
                </div>
                <div class="page-content">
                    <textarea id="txtR" oninput="save()" placeholder="..."></textarea>
                    <button onclick="move(1)" style="position:absolute; bottom:20px; right:20px; background:black; color:white; border:none; padding:10px; cursor:pointer; font-family:'Bebas Neue'; border-radius:50px;">NEXT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let day = new Date().toISOString().split('T')[0];
        let logs = JSON.parse(localStorage.getItem('uv_logs')) || {};

        function tab(t) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            if(t==='diary') buildDiary();
        }

        function buildDiary() {
            document.getElementById('dateDisplay').innerText = new Date(day + 'T12:00:00').toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}).toUpperCase();
            
            let data = logs[day] || {l:"", r:"", bold: false, font: "'UnifrakturMaguntia', cursive", size: "22"};
            
            document.getElementById('txtL').value = data.l; 
            document.getElementById('txtR').value = data.r;
            document.getElementById('fnt').value = data.font;
            document.getElementById('sz').value = data.size;

            const btn = document.getElementById('boldBtn');
            if(data.bold) {
                document.getElementById('txtL').classList.add('bold-text');
                document.getElementById('txtR').classList.add('bold-text');
                btn.classList.add('bold-active');
            } else {
                document.getElementById('txtL').classList.remove('bold-text');
                document.getElementById('txtR').classList.remove('bold-text');
                btn.classList.remove('bold-active');
            }
            
            styleBook();
        }

        function styleBook() {
            const fontChoice = document.getElementById('fnt').value;
            const sizeChoice = document.getElementById('sz').value + "px";
            
            const tl = document.getElementById('txtL');
            const tr = document.getElementById('txtR');

            // THE NUCLEAR FIX: Direct manipulation of style properties
            tl.style.setProperty('font-family', fontChoice, 'important');
            tr.style.setProperty('font-family', fontChoice, 'important');
            tl.style.fontSize = sizeChoice;
            tr.style.fontSize = sizeChoice;

            save();
        }

        function toggleBold() {
            document.getElementById('txtL').classList.toggle('bold-text');
            document.getElementById('txtR').classList.toggle('bold-text');
            document.getElementById('boldBtn').classList.toggle('bold-active');
            save();
        }

        function save() {
            logs[day] = {
                l: document.getElementById('txtL').value,
                r: document.getElementById('txtR').value,
                bold: document.getElementById('txtL').classList.contains('bold-text'),
                font: document.getElementById('fnt').value,
                size: document.getElementById('sz').value
            };
            localStorage.setItem('uv_logs', JSON.stringify(logs));
        }

        function openBook() { 
            const cover = document.getElementById('bookCover');
            cover.style.transform = "rotateY(-110deg)"; 
            cover.style.opacity = "0"; 
            setTimeout(() => { 
                cover.style.visibility = "hidden"; 
                document.getElementById('bookObj').style.visibility = "visible"; 
                styleBook(); // Force a restyle once visible
            }, 600); 
        }

        function closeBook() { 
            const cover = document.getElementById('bookCover');
            document.getElementById('bookObj').style.visibility = "hidden"; 
            cover.style.visibility = "visible"; 
            cover.style.opacity = "1"; 
            cover.style.transform = "rotateY(0deg)"; 
        }

        function move(n) { 
            save(); 
            let d = new Date(day + 'T12:00:00'); 
            d.setDate(d.getDate() + n); 
            day = d.toISOString().split('T')[0]; 
            buildDiary(); 
        }

        function jump(v) { if(v) { day=v; buildDiary(); } }

        // Initial check
        window.onload = () => { if(document.getElementById('diary').classList.contains('active')) buildDiary(); };
    </script>
</body>
</html>
